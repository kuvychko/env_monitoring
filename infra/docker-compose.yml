services:
  mosquitto:
    image: eclipse-mosquitto:2.1.2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:2.26.0-pg16
    container_name: postgres
    environment:
      POSTGRES_USER: iaq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: iaq
    # Port not exposed externally - only accessible within Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  ingest:
    build: ../backend/ingest_mqtt
    container_name: ingest
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: "iaq/+/telemetry"
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: iaq
      PG_USER: iaq
      PG_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - mosquitto
      - postgres
    restart: unless-stopped

  ingest_purpleair:
    build: ../backend/ingest_purpleair
    container_name: ingest_purpleair
    environment:
      PURPLEAIR_API_KEY: ${PURPLEAIR_API_KEY}
      PURPLEAIR_SENSOR_INDEX: ${PURPLEAIR_SENSOR_INDEX}
      PURPLEAIR_READ_KEY: ${PURPLEAIR_READ_KEY}
      PURPLEAIR_POLL_INTERVAL: "120"
      PURPLEAIR_LOOKBACK_HOURS: "24"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: iaq
      PG_USER: iaq
      PG_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SAMESITE: strict
      # Pass postgres password for datasource provisioning
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  postgres_data:
  grafana_data:
