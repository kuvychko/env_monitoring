# Two deployment modes, one set of artifacts (see docs/deployment_raspberry_pi.md):
#
#   standalone (default for reproduction):
#     docker compose --profile standalone up -d --build
#     Brings up a bundled TimescaleDB (`db`); everything runs self-contained.
#
#   shared (attach to an existing shared TimescaleDB cluster):
#     set PG_HOST (+ PG_MIGRATE_* for the first run) in .env, then:
#     docker compose up -d --build
#     No DB container is started; services connect to the external cluster.
#
# The only switch is PG_HOST (+ whether the `standalone` profile is active).

services:
  mosquitto:
    # NB: the 2.1.x line is published as -alpine only; a bare 2.1.2 tag does not exist
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  db:
    # Bundled database — standalone mode only. In shared mode the cluster
    # already exists elsewhere and this service never starts.
    image: timescale/timescaledb:2.26.0-pg16
    container_name: db
    profiles: [standalone]
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_PASSWORD: ${POSTGRES_SUPER_PW}
    # Port not exposed externally - only accessible within Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  migrate:
    # One-shot migration runner — both modes. Idempotent; exits when done.
    image: timescale/timescaledb:2.26.0-pg16
    environment:
      PG_HOST: ${PG_HOST:-db}
      PG_PORT: "5432"
      PG_DB: ${PG_DB:-warehouse}
      PG_MIGRATE_USER: ${PG_MIGRATE_USER:-postgres}
      PG_MIGRATE_PASSWORD: ${PG_MIGRATE_PASSWORD:-${POSTGRES_SUPER_PW}}
      IAQ_OWNER_PW: ${IAQ_OWNER_PW}
      IAQ_RW_PW: ${IAQ_RW_PW}
      IAQ_RO_PW: ${IAQ_RO_PW}
    volumes:
      - ./postgres/migrations:/migrations:ro
      - ./postgres/migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]
    restart: "no"

  ingest:
    build: ../backend/ingest_mqtt
    container_name: ingest
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: "iaq/+/telemetry"
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      PG_HOST: ${PG_HOST:-db}
      PG_PORT: "5432"
      PG_DB: ${PG_DB:-warehouse}
      PG_USER: iaq_rw
      PG_PASSWORD: ${IAQ_RW_PW}
    depends_on:
      mosquitto:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  ingest_purpleair:
    build: ../backend/ingest_purpleair
    container_name: ingest_purpleair
    environment:
      PURPLEAIR_API_KEY: ${PURPLEAIR_API_KEY}
      PURPLEAIR_SENSOR_INDEX: ${PURPLEAIR_SENSOR_INDEX}
      PURPLEAIR_READ_KEY: ${PURPLEAIR_READ_KEY}
      PURPLEAIR_POLL_INTERVAL: "600"
      PURPLEAIR_AVERAGE: "10"
      PURPLEAIR_LOOKBACK_HOURS: "24"
      PG_HOST: ${PG_HOST:-db}
      PG_PORT: "5432"
      PG_DB: ${PG_DB:-warehouse}
      PG_USER: iaq_rw
      PG_PASSWORD: ${IAQ_RW_PW}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SAMESITE: strict
      # Datasource provisioning (read-only role)
      PG_HOST: ${PG_HOST:-db}
      PG_DB: ${PG_DB:-warehouse}
      IAQ_RO_PW: ${IAQ_RO_PW}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  postgres_data:
  grafana_data:
