# Mosquitto MQTT Broker Configuration

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# Listener (no auth for local dev - add auth for production)
listener 1883
allow_anonymous true

# WebSocket listener (optional, for browser-based MQTT clients)
# listener 9001
# protocol websockets
